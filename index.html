<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Mapa 3D Real - Lima Store</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { margin: 0; overflow: hidden; font-family: sans-serif; background: #0b0f1a; }
        #canvas-container { width: 100vw; height: 100vh; }
        .ui-panel { background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
        .kb-orange { background: #ff6500; }
    </style>
</head>
<body>

    <div id="canvas-container"></div>

    <div class="fixed top-6 left-6 z-50 flex flex-col gap-4">
        <div class="ui-panel p-6 rounded-2xl text-white w-80 shadow-2xl border-t-4 border-orange-500">
            <h1 class="text-xl font-black mb-4 flex items-center gap-2 italic">
                <i data-lucide="box" class="text-orange-500"></i> LIMA <span class="text-blue-400">3D LOG</span>
            </h1>
            
            <label class="w-full kb-orange text-white py-2 px-4 rounded-lg font-bold text-xs flex items-center justify-center gap-2 cursor-pointer mb-4 hover:brightness-110 transition">
                <i data-lucide="upload"></i> CARREGAR PLANILHA
                <input type="file" id="up-excel" hidden onchange="importar(event)">
            </label>

            <input type="text" id="input-bip" placeholder="Bipar Etiqueta ou CF..." 
                   class="w-full bg-slate-800 border border-slate-700 p-3 rounded-xl outline-none focus:ring-2 focus:ring-blue-500 text-sm font-bold">
            
            <div id="info-produto" class="hidden mt-4 p-4 bg-white/5 rounded-xl border border-white/10 animate-in fade-in zoom-in duration-300">
                <p class="text-[10px] text-orange-400 font-black uppercase tracking-widest">Produto Localizado:</p>
                <p id="nome-item" class="font-bold text-sm leading-tight my-2">---</p>
                <div class="flex justify-between text-[11px] font-mono text-blue-300 bg-blue-900/20 p-2 rounded">
                    <span>Rua: <b id="rua-val">--</b></span>
                    <span>Estante: <b id="est-val">--</b></span>
                    <span>Prat: <b id="prat-val">--</b></span>
                </div>
                <button onclick="transferir()" class="w-full bg-red-600 hover:bg-red-700 text-white font-bold py-3 rounded-lg mt-4 text-xs transition uppercase shadow-lg">
                    Transferência (Remover)
                </button>
            </div>
        </div>

        <div class="ui-panel p-3 rounded-xl text-white/50 text-[10px] font-bold uppercase tracking-wider">
            Itens no Mapa: <span id="count-itens" class="text-green-400">0</span>
        </div>
    </div>

    <script>
        lucide.createIcons();

        // --- ENGINE 3D ---
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        scene.add(new THREE.AmbientLight(0xffffff, 0.7));
        const dirLight = new THREE.DirectionalLight(0xffffff, 0.5);
        dirLight.position.set(20, 50, 20);
        scene.add(dirLight);

        // Chão Estilizado
        const grid = new THREE.GridHelper(200, 80, 0x1e293b, 0x111827);
        scene.add(grid);

        let blocos3D = {}; 
        let estoque = [];

        // FUNÇÃO DE IMPORTAÇÃO
        function importar(e) {
            const reader = new FileReader();
            reader.onload = (event) => {
                const data = new Uint8Array(event.target.result);
                const wb = XLSX.read(data, {type: 'array'});
                estoque = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);
                localStorage.setItem('dados_estoque', JSON.stringify(estoque));
                montarMapa();
            };
            reader.readAsArrayBuffer(e.target.files[0]);
        }

        // MONTAGEM DO MAPA BASEADO NA SUA PLANILHA
        function montarMapa() {
            // Limpa mapa anterior
            Object.values(blocos3D).forEach(b => scene.remove(b));
            blocos3D = {};

            estoque.forEach(item => {
                // Filtra apenas itens com localização
                if (item.Andar && item.Estante) {
                    const geometry = new THREE.BoxGeometry(1.4, 2.8, 0.9);
                    const material = new THREE.MeshPhongMaterial({ color: 0x2d3748, transparent: true, opacity: 0.9 });
                    const cube = new THREE.Mesh(geometry, material);

                    // POSICIONAMENTO REAL:
                    // Dividimos o Andar por 10 para as ruas não ficarem muito longe
                    const posX = (parseInt(item.Andar) / 10) || 0;
                    const posZ = (parseInt(item.Estante) * 2) || 0;
                    const posY = (parseInt(item.Prateleira) / 10) || 1.4; // Eleva o bloco se tiver prateleira alta
                    
                    cube.position.set(posX, posY, posZ);
                    scene.add(cube);

                    // Borda Neon
                    const edges = new THREE.EdgesGeometry(geometry);
                    const line = new THREE.LineSegments(edges, new THREE.LineBasicMaterial({ color: 0x3b82f6 }));
                    cube.add(line);

                    // Mapeia para busca
                    if(item.Local_Etiqueta) blocos3D[String(item.Local_Etiqueta)] = cube;
                    if(item.Codigo_CF) blocos3D[String(item.Codigo_CF)] = cube;
                    
                    cube.userData = item;
                }
            });
            document.getElementById('count-itens').innerText = Object.keys(blocos3D).length;
            camera.position.set(30, 30, 30);
            camera.lookAt(0,0,0);
        }

        // BUSCA E ZOOM
        document.getElementById('input-bip').addEventListener('input', (e) => {
            const busca = String(e.target.value);
            const bloco = blocos3D[busca];

            // Reseta cores
            Object.values(blocos3D).forEach(b => b.material.color.setHex(0x2d3748));

            if (bloco) {
                const d = bloco.userData;
                document.getElementById('info-produto').classList.remove('hidden');
                document.getElementById('nome-item').innerText = d.Nome_Produto;
                document.getElementById('rua-val').innerText = d.Andar;
                document.getElementById('est-val').innerText = d.Estante;
                document.getElementById('prat-val').innerText = d.Prateleira || "0";
                
                bloco.material.color.setHex(0xff6500); // Laranja KaBuM

                // Move Câmera para o objeto
                const targetPos = new THREE.Vector3(bloco.position.x + 10, bloco.position.y + 10, bloco.position.z + 10);
                camera.position.lerp(targetPos, 0.1);
                camera.lookAt(bloco.position);
            } else {
                document.getElementById('info-produto').classList.add('hidden');
            }
        });

        function transferir() {
            const busca = document.getElementById('input-bip').value;
            const bloco = blocos3D[busca];
            if(bloco && confirm("Realizar transferência? O local será liberado.")) {
                scene.remove(bloco);
                delete blocos3D[busca];
                document.getElementById('info-produto').classList.add('hidden');
                document.getElementById('input-bip').value = "";
                document.getElementById('count-itens').innerText = Object.keys(blocos3D).length;
            }
        }

        function animate() {
            requestAnimationFrame(animate);
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
