<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LIMA 2D LOG - Tiete Light</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #f1f5f9; font-family: sans-serif; }
        canvas { display: block; cursor: grab; }
        .kb-panel { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(5px); border: 1px solid #e2e8f0; }
        .kb-orange { background: #ff6500; }
        .kb-blue { color: #1a70b9; }
    </style>
</head>
<body>

    <div id="canvas-container" class="w-screen h-screen"></div>

    <div class="fixed top-6 left-6 z-50 flex flex-col gap-4 w-80 pointer-events-none">
        <div class="kb-panel p-5 rounded-2xl shadow-xl border-l-4 border-[#ff6500] pointer-events-auto">
            <h1 class="font-black italic text-xl mb-4 text-slate-800">LIMA <span class="kb-blue font-bold">2D-LOG</span></h1>
            
            <input type="text" id="input-bip" placeholder="Bipar Etiqueta ou CF..." 
                   class="w-full bg-white border border-slate-200 p-3 rounded-xl text-slate-900 outline-none focus:ring-2 focus:ring-[#ff6500] font-bold text-sm transition">
            
            <div id="info-item" class="hidden mt-4 p-4 bg-slate-50 border border-slate-100 rounded-xl text-slate-800 animate-pulse">
                <p id="nome-txt" class="font-bold text-[11px] uppercase mb-2 leading-tight">---</p>
                <div class="flex justify-between text-[10px] font-mono kb-blue bg-blue-50 p-2 rounded">
                    <span>Rua: <b id="rua-v">--</b></span>
                    <span>Estante: <b id="est-v">--</b></span>
                    <span>Prat: <b id="prat-v">--</b></span>
                </div>
                <button onclick="transferir()" class="w-full bg-red-600 text-white font-bold py-2.5 rounded-lg mt-4 text-[11px] uppercase hover:bg-red-700 transition shadow">
                    Transferência (Remover)
                </button>
            </div>
        </div>
    </div>

    <div class="fixed bottom-6 left-6 right-6 z-50 flex justify-between items-end pointer-events-none">
        <div class="flex gap-3 pointer-events-auto">
            <label class="kb-panel px-6 py-4 rounded-xl cursor-pointer text-slate-700 font-bold text-sm flex items-center gap-2.5 shadow-md hover:bg-slate-50 transition">
                <i data-lucide="upload" class="kb-blue"></i> ATUALIZAR ESTOQUE (EXCEL)
                <input type="file" id="up-excel" hidden onchange="syncExcel(event)">
            </label>
        </div>
        <div class="kb-panel p-4 rounded-xl text-slate-500 text-[10px] font-bold uppercase pointer-events-auto">Status: <span class="text-green-500">2D ONLINE</span></div>
    </div>

    <script>
        lucide.createIcons();

        // --- CONFIGURAÇÃO CANVAS 2D ---
        const container = document.getElementById('canvas-container');
        const canvas = document.createElement('canvas');
        container.appendChild(canvas);
        const ctx = canvas.getContext('2d');

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            desenharMapa(); // Redesenha quando muda o tamanho
        }
        window.addEventListener('resize', resizeCanvas);

        let estoqueCache = [];
        let estantesFixas = [];
        let localBusca = null; // Guarda o local que foi bipado

        // --- ESTRUTURA FIXA DO MAPA (Baseado na sua foto de cima) ---
        // Vamos desenhar os corredores: Rua 100, 200, 300, etc.
        const layoutLoja = [
            { rua: 100, estantes: [0, 1, 2, 3, 4, 5, 8, 50] }, // Rua 100 (com a de defeito)
            { rua: 200, estantes: [1, 2, 3, 4, 5, 10, 12] }, // Rua 200
            { rua: 300, estantes: [1, 2, 3, 4, 5] },          // Rua 300
            { rua: 400, estantes: [1, 2, 3, 4, 5] }           // Exemplo de Rua 400
        ];

        // Configurações visuais do mapa 2D
        const configMap = {
            escalaRua: 150, // Distância entre as ruas
            escalaEstante: 60, // Distância entre as estantes
            larguraEstante: 30, // Largura do quadradinho
            alturaEstante: 40,  // Altura do quadradinho
            paddingX: 250, // Deslocamento inicial do mapa
            paddingY: 100
        };

        function desenharMapa() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            estantesFixas = []; // Limpa para recalcular posições

            layoutLoja.forEach((ruaInfo, indexRua) => {
                const posX = configMap.paddingX + (indexRua * configMap.escalaRua);
                
                // Desenha o nome da Rua
                ctx.fillStyle = '#1a70b9';
                ctx.font = 'bold 16px Inter, sans-serif';
                ctx.fillText(`RUA ${ruaInfo.rua}`, posX, configMap.paddingY - 20);

                ruaInfo.estantes.forEach(est => {
                    const posY = configMap.paddingY + (est * configMap.escalaEstante);
                    
                    // Define se a estante está ativa na busca
                    const idLocal = `${ruaInfo.rua}-${est}`;
                    const isBusca = localBusca === idLocal;

                    // Estilo da Estante (Metal/Azul igual à foto)
                    ctx.fillStyle = isBusca ? '#ff6500' : '#1e293b'; // Laranja se buscar, senão azul
                    ctx.fillRect(posX, posY, configMap.larguraEstante, configMap.alturaEstante);
                    
                    // Borda Neon
                    ctx.lineWidth = isBusca ? 4 : 2;
                    ctx.strokeStyle = isBusca ? '#9b121c' : '#3b82f6';
                    ctx.strokeRect(posX, posY, configMap.larguraEstante, configMap.alturaEstante);

                    // Número da Estante
                    ctx.fillStyle = isBusca ? 'white' : 'white';
                    ctx.font = '12px Courier New';
                    ctx.fillText(est, posX + 10, posY + 25);

                    // Guarda a posição para cliques futuros (se precisar)
                    estantesFixas.push({ idLocal, x: posX, y: posY, w: configMap.larguraEstante, h: configMap.alturaEstante });
                });
            });
        }

        // --- SINCRONIZAÇÃO COM O EXCEL ---
        function syncExcel(e) {
            const reader = new FileReader();
            reader.onload = (ev) => {
                const wb = XLSX.read(ev.target.result, {type: 'array'});
                estoqueCache = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);
                alert(`Estoque ${estoqueCache.length} Sincronizado com o Mapa 2D!`);
                localBusca = null; // Reseta busca
                desenharMapa();
            };
            reader.readAsArrayBuffer(e.target.files[0]);
        }

        // --- BUSCA (O "BIP") ---
        document.getElementById('input-bip').addEventListener('input', (e) => {
            const val = e.target.value;
            // Procura o item no cache do Excel
            const p = estoqueCache.find(i => String(i.Local_Etiqueta) === val || String(i.Codigo_CF) === val);
            
            if(p) {
                localBusca = `${p.Andar}-${p.Estante}`; // Define qual local deve brilhar
                document.getElementById('info-item').classList.remove('hidden');
                document.getElementById('nome-txt').innerText = p.Nome_Produto;
                document.getElementById('rua-v').innerText = p.Andar;
                document.getElementById('est-v').innerText = p.Estante;
                document.getElementById('prat-v').innerText = p.Prateleira || 0;
            } else {
                localBusca = null; // Desliga brilho
                document.getElementById('info-item').classList.add('hidden');
            }
            desenharMapa(); // Redesenha com o brilho laranja
        });

        // --- TRANSFERÊNCIA (BAIXA) ---
        function transferir() {
            const val = document.getElementById('input-bip').value;
            if(confirm("Confirmar baixa deste item? O local ficará livre.")) {
                // Remove do cache
                estoqueCache = estoqueCache.filter(i => String(i.Local_Etiqueta) !== val && String(i.Codigo_CF) !== val);
                document.getElementById('info-item').classList.add('hidden');
                document.getElementById('input-bip').value = "";
                localBusca = null;
                desenharMapa();
                alert("Transferência Realizada! Dados atualizados na memória.");
            }
        }

        // Inicialização
        resizeCanvas();

    </script>
</body>
</html>
