    <style>
        body { margin: 0; background: #020617; font-family: 'Inter', sans-serif; display: flex; height: 100vh; overflow: hidden; color: white; }
        #map-section { flex: 1; background: #020617; display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; }
        #control-panel { width: 360px; background: #0f172a; padding: 25px; display: flex; flex-direction: column; gap: 20px; z-index: 50; border-left: 1px solid rgba(255,255,255,0.1); box-shadow: -10px 0 30px rgba(0,0,0,0.5); }
        .glass { background: rgba(30, 41, 59, 0.4); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
        canvas { border-radius: 12px; cursor: crosshair; }
        .btn-baixa { background: linear-gradient(to right, #dc2626, #991b1b); transition: all 0.3s ease; }
        .btn-baixa:hover { transform: scale(1.02); filter: brightness(1.2); }
    </style>
</head>
<body>

    <div id="map-section">
        <canvas id="log-canvas"></canvas>
    </div>

    <div id="control-panel">
        <div class="mb-2">
            <h1 class="text-[#ff6500] font-black italic text-4xl tracking-tighter uppercase leading-none">Lima</h1>
            <h2 class="text-blue-500 text-[10px] font-bold tracking-[0.3em] mt-1 uppercase">Logística Oficial</h2>
        </div>

        <div class="glass p-5 rounded-3xl space-y-3">
            <label class="block text-[9px] font-black text-slate-500 uppercase tracking-widest">Aguardando Scanner...</label>
            <input type="text" id="input-bip" autofocus placeholder="Bipe a Etiqueta..." 
                   class="w-full bg-slate-900 border border-slate-700 p-4 rounded-xl text-white outline-none focus:ring-2 focus:ring-[#ff6500] font-bold text-lg transition shadow-inner">
        </div>

        <div id="info-item" class="hidden glass p-5 rounded-3xl border-l-8 border-[#ff6500] animate-in fade-in zoom-in duration-300">
            <p class="font-bold text-[10px] uppercase text-slate-400 mb-2">Localização no Mapa:</p>
            <div class="bg-orange-600/10 p-5 rounded-xl text-center border border-orange-500/20">
                <span class="text-[9px] text-orange-500 font-bold block mb-1 uppercase tracking-tighter">Nicho Selecionado</span>
                <b id="est-v" class="text-white text-5xl font-mono tracking-tighter">--</b>
            </div>
            
            <button onclick="realizarBaixa()" class="btn-baixa w-full mt-4 text-white font-black py-4 rounded-xl text-[11px] uppercase flex items-center justify-center gap-2 shadow-lg">
                <i data-lucide="package-check" class="w-4"></i> Confirmar Baixa
            </button>
        </div>

        <div class="mt-auto space-y-3">
            <label class="w-full glass px-4 py-4 rounded-xl cursor-pointer text-white/70 font-bold text-[11px] flex items-center justify-center gap-2 hover:bg-white/5 transition border-dashed border border-slate-700">
                <i data-lucide="file-up" class="w-4 text-green-500"></i> IMPORTAR EXCEL (DB)
                <input type="file" id="up-excel" hidden onchange="syncExcel(event)">
            </label>
            <button onclick="mostrarInserirItem()" class="w-full glass px-4 py-4 rounded-xl text-white/70 font-bold text-[11px] flex items-center justify-center gap-2 hover:bg-white/5 transition border-dashed border border-slate-700">
                <i data-lucide="plus" class="w-4 text-blue-500"></i> INSERIR ITEM MANUAL
            </button>
            <button onclick="testarFirebase()" class="w-full glass px-4 py-4 rounded-xl text-white/70 font-bold text-[11px] flex items-center justify-center gap-2 hover:bg-white/5 transition border-dashed border border-slate-700">
                <i data-lucide="zap" class="w-4 text-yellow-500"></i> TESTAR CONEXÃO FIREBASE
            </button>
            <div class="flex justify-between items-center px-2">
                <p id="status-db" class="text-[8px] text-slate-500 uppercase font-bold">Base de dados vazia</p>
                <p class="text-[8px] text-slate-600 uppercase font-bold">v8.2 FINAL</p>
        </div>
    </div>

    <!-- Modal para Inserir Item -->
    <div id="modal-inserir" class="fixed inset-0 bg-black/50 hidden flex items-center justify-center z-50">
        <div class="glass p-6 rounded-3xl w-80 space-y-4">
            <h3 class="text-white font-bold text-lg uppercase">Inserir Item Manual</h3>
            <input type="text" id="input-etiqueta" placeholder="Etiqueta (ex: 123456)" class="w-full bg-slate-900 border border-slate-700 p-3 rounded-xl text-white outline-none focus:ring-2 focus:ring-[#ff6500]">
            <select id="select-prateleira" class="w-full bg-slate-900 border border-slate-700 p-3 rounded-xl text-white outline-none focus:ring-2 focus:ring-[#ff6500]">
                <option value="">Selecione uma prateleira...</option>
            </select>
            <div class="flex gap-2">
                <button onclick="inserirItem()" class="flex-1 bg-green-600 hover:bg-green-700 text-white font-bold py-2 rounded-xl">Inserir</button>
                <button onclick="fecharModal()" class="flex-1 bg-gray-600 hover:bg-gray-700 text-white font-bold py-2 rounded-xl">Cancelar</button>
            </div>
        </div>
    </div>

    <script>
    lucide.createIcons();
    const canvas = document.getElementById('log-canvas');
    const ctx = canvas.getContext('2d');
    const mapSection = document.getElementById('map-section');
    
    let estoqueCache = [];
    let alvoID = null;
    let etiquetaAtual = null;

    // Carregar dados do Firebase
    async function carregarEstoque() {
        try {
            console.log('Tentando conectar ao Firebase...');
            const querySnapshot = await window.firebaseDB.collection('estoque').get();
            estoqueCache = querySnapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            console.log('Estoque carregado:', estoqueCache);
            atualizarContador();
        } catch (error) {
            console.error("Erro ao carregar estoque:", error);
            alert("Erro ao conectar com o servidor. Verifique as regras do Firestore.");
            // Fallback para localStorage se Firebase falhar
            estoqueCache = JSON.parse(localStorage.getItem('estoqueCache')) || [];
            atualizarContador();
        }
    }

    // Proporção do Mapa
    const BASE_W = 1250;
    const BASE_H = 850;

    function resize() {
        const scale = Math.min(mapSection.clientWidth / BASE_W, mapSection.clientHeight / BASE_H) * 0.95;
        canvas.width = BASE_W * scale;
        canvas.height = BASE_H * scale;
        ctx.setTransform(scale, 0, 0, scale, 0, 0);
    }
    window.addEventListener('resize', resize);
    resize();

    // Desenha Prateleiras Padrão (Lado Esquerdo)
    const drawShelf = (x, y, ids) => {
        const sW = 95;
        const sH = 26;
        const gap = 4;
        const fullH = ids.length * (sH + gap) - gap;

        // Estrutura de prateleira (linhas laterais e bordas)
        ctx.fillStyle = 'rgba(30, 41, 59, 0.6)';
        ctx.strokeStyle = '#334155';
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.roundRect(x - 8, y - 8, sW + 16, fullH + 16, 9);
        ctx.fill();
        ctx.stroke();

        // Linhas transversais entre nichos
        ctx.strokeStyle = '#223248';
        for (let i = 0; i <= ids.length; i++) {
            const lineY = y + i * (sH + gap) - gap / 2;
            ctx.beginPath();
            ctx.moveTo(x - 4, lineY);
            ctx.lineTo(x + sW + 4, lineY);
            ctx.stroke();
        }

        ids.forEach((id, i) => {
            const posY = y + (i * (sH + gap));
            const active = String(alvoID) === String(id);
            ctx.fillStyle = active ? '#ff6500' : '#1e293b';
            ctx.strokeStyle = active ? '#fff' : '#334155';
            ctx.shadowBlur = active ? 15 : 0;
            ctx.shadowColor = '#ff6500';
            ctx.beginPath(); ctx.roundRect(x, posY, sW, sH, 4); ctx.fill(); ctx.stroke();
            ctx.shadowBlur = 0;
            ctx.fillStyle = active ? '#fff' : '#94a3b8';
            ctx.font = 'bold 12px Inter'; ctx.textAlign = 'center';
            ctx.fillText(id, x + sW/2, posY + sH/2 + 5);
        });
    };

    // Desenha os Grupos de Nichos Verticais (Lado Direito)
    const drawShelfGroup = (x, y, ids, hasFrame = true) => {
        const nW = 45;
        const nH = 85;
        const gap = 3;
        const fullW = ids.length * (nW + gap) - gap;

        if (hasFrame) {
            // Estrutura de prateleira (linhas laterais e bordas)
            ctx.fillStyle = 'rgba(30, 41, 59, 0.6)';
            ctx.strokeStyle = '#334155';
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.roundRect(x - fullW - 8, y - 8, fullW + 16, nH + 16, 9);
            ctx.fill();
            ctx.stroke();

            // Linhas transversais entre nichos
            ctx.strokeStyle = '#223248';
            for (let i = 0; i <= ids.length; i++) {
                const lineX = x - i * (nW + gap) + gap / 2;
                ctx.beginPath();
                ctx.moveTo(lineX, y - 4);
                ctx.lineTo(lineX, y + nH + 4);
                ctx.stroke();
            }
        }

        ids.forEach((id, i) => {
            const posX = x - (i * (nW + gap));
            const active = String(alvoID) === String(id);

            // Se for ID de cofre, desenha como cofre integrado e pula o nicho padrão
            if(id === 202677 || id === 202678) {
                const cofreW = nW * 1.3;
                const cofreH = nH * 1.3;
                const cofreX = posX - (cofreW - nW) / 2;
                const cofreY = y - (cofreH - nH) / 2;
                drawCofre(cofreX, cofreY, cofreW, cofreH, id, active);
                return;
            }

            ctx.fillStyle = active ? '#ff6500' : '#1e293b';
            ctx.strokeStyle = active ? '#fff' : '#334155';
            ctx.shadowBlur = active ? 20 : 0;
            ctx.shadowColor = '#ff6500';
            ctx.beginPath(); ctx.roundRect(posX, y, nW, nH, 4); ctx.fill(); ctx.stroke();
            ctx.shadowBlur = 0;
            ctx.fillStyle = active ? '#fff' : '#94a3b8';
            ctx.font = 'bold 11px Inter'; ctx.textAlign = 'center';
            const str = String(id);
            for(let j=0; j<str.length; j++) {
                ctx.fillText(str[j], posX + nW/2, y + 15 + (j*12));
            }
        });
    };

    const drawCofre = (x, y, w, h, id, labelTop = null) => {
        const active = String(alvoID) === String(id);
        ctx.fillStyle = active ? '#ff6500' : '#334155';
        ctx.beginPath();
        ctx.roundRect(x, y, w, h, 8);
        ctx.fill();
        ctx.fillStyle = '#0f172a';
        ctx.beginPath(); ctx.arc(x + 15, y + h/2, 3, 0, Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.arc(x + 35, y + h/2, 8, 0, Math.PI*2); ctx.stroke();
        ctx.fillStyle = active ? '#fff' : '#94a3b8';
        ctx.font = 'bold 12px Inter'; ctx.textAlign = 'center';
        const idStr = String(id);
        if (w < 70) {
            // cofre pequeno: verticaliza o texto para não vazar
            for (let i = 0; i < idStr.length; i++) {
                ctx.fillText(idStr[i], x + w/2, y + 18 + i * 12);
            }
        } else {
            ctx.fillText(idStr, x + w/2, y + h/2 + 5);
        }
        if(labelTop) { ctx.fillStyle = '#64748b'; ctx.fillText(labelTop, x + w/2, y - 12); }
    };

    function render() {
        ctx.fillStyle = '#020617';
        ctx.fillRect(0, 0, BASE_W, BASE_H);

        // --- PRATELEIRAS ESQUERDA ---
        for(let i=0; i<5; i++) drawShelf(40 + (i * 110), 40, [185674+(i*4), 185675+(i*4), 185676+(i*4), 185677+(i*4)]);
        for(let i=0; i<6; i++) drawShelf(40 + (i * 110), 200, [185650+(i*4), 185651+(i*4), 185652+(i*4), 185653+(i*4)]);
        for(let i=0; i<6; i++) drawShelf(40 + (i * 110), 380, [185626+(i*4), 185627+(i*4), 185628+(i*4), 185629+(i*4)]);
        
        // Rodapé Prateleiras
        drawShelf(40, 650, [185601, 185602, 185603, 185604]);
        drawShelf(150, 650, [185605, 185606, 185607, 185608]);
        drawShelf(390, 650, [185610, 185611, 185612, 185613]);
        drawShelf(650, 650, [185615, 185616, 185617, 185618]);
        drawShelf(775, 635, [185619, 185620, 185621]);
        drawShelf(890, 650, [185622, 185623, 185624, 185625]);

        // --- DIREITA (Nichos Integrados com Cofres) ---
        drawShelfGroup(1150, 40, [185700, 202669, 202670, 202671], false);
        drawShelfGroup(1150, 200, [185697, 185698, 185699, 202677], false); // 202677 é Cofre agora
        drawShelfGroup(1150, 420, [185694, 185695, 185696, 202678], false); // 202678 é Cofre agora

        // --- COFRES E CENTRO ---
        // Adicionar nichos adicionais acima dos cofres conforme pedido
        drawShelf(270, 640, [185609]); // acima do cofre 202682
        drawShelf(520, 640, [185614]); // acima do cofre 202681
        drawShelf(1030, 640, [202683]); // acima do cofre 202679

        drawCofre(270, 680, 100, 100, 202682);
        drawCofre(520, 680, 100, 100, 202681);
        drawCofre(775, 730, 100, 50, 202680);
        drawCofre(1030, 680, 90, 100, 202679, );
       
        // Blocos Centrais Fixos
        const midX = 720;
        [{y: 330, id: 202672}, {y: 365, id: 202673}, {y: 480, id: 202674}, {y: 515, id: 202675}].forEach(b => {
            const active = String(alvoID) === String(b.id);
            ctx.fillStyle = active ? '#ff6500' : '#334155';
            ctx.fillRect(midX, b.y, 80, 26);
            ctx.fillStyle = '#fff'; ctx.font = "bold 11px Inter"; ctx.fillText(b.id, midX + 40, b.y + 18);
        });
        // 202676 Vertical
        ctx.fillStyle = String(alvoID) === '202676' ? '#ff6500' : '#475569';
        ctx.fillRect(midX + 25, 400, 30, 70);
        ctx.save(); ctx.translate(midX+40, 435); ctx.rotate(-Math.PI/2);
        ctx.fillStyle = '#fff'; ctx.fillText("202676", 0, 5); ctx.restore();

        // Escritório
        ctx.strokeStyle = '#334155'; ctx.strokeRect(600, 40, 140, 80);
        ctx.fillStyle = '#1e293b'; ctx.fillRect(645, 60, 50, 35);

        requestAnimationFrame(render);
    }

    // LÓGICA DE BUSCA
    document.getElementById('input-bip').addEventListener('input', (e) => {
        const val = e.target.value.trim();
        if(val.length < 3) {
            alvoID = null;
            document.getElementById('info-item').classList.add('hidden');
            return;
        }

        const item = estoqueCache.find(i => String(i.etiqueta) === val);
        if(item) {
            alvoID = item.prateleira;
            etiquetaAtual = val;
            document.getElementById('info-item').classList.remove('hidden');
            document.getElementById('est-v').innerText = alvoID;
        } else {
            alvoID = null;
            document.getElementById('info-item').classList.add('hidden');
        }
    });

    // FUNÇÃO DE BAIXA (ATUALIZAÇÃO DO SISTEMA)
    async function realizarBaixa() {
        if(!etiquetaAtual) return;

        try {
            // Remove do Firebase
            const querySnapshot = await window.firebaseDB.collection('estoque').where('etiqueta', '==', etiquetaAtual).get();
            querySnapshot.forEach(async (document) => {
                await window.firebaseDB.collection('estoque').doc(document.id).delete();
            });

            // Remove do cache local
            estoqueCache = estoqueCache.filter(i => String(i.etiqueta) !== etiquetaAtual);

            // Salva no localStorage como backup
            localStorage.setItem('estoqueCache', JSON.stringify(estoqueCache));
            localStorage.setItem('ultimaBaixa', JSON.stringify({ etiqueta: etiquetaAtual, prateleira: alvoID, data: new Date().toISOString() }));

            // Reseta interface
            alert("✅ BAIXA REALIZADA: Etiqueta " + etiquetaAtual + " removida do estoque.");

            etiquetaAtual = null;
            alvoID = null;
            document.getElementById('input-bip').value = '';
            document.getElementById('info-item').classList.add('hidden');
            document.getElementById('input-bip').focus();

            atualizarContador();

            // Redireciona para o sistema Kabum após a baixa
            window.location.href = "https://manager.kabum.com.br/cgi-local/expedicao/armazenagem/coletor/sku_setar.cgi?msg=1&erros=";
        } catch (error) {
            console.error("Erro ao realizar baixa:", error);
            alert("Erro ao remover do servidor. Tente novamente.");
        }
    }

    async function syncExcel(e) {
        const reader = new FileReader();
        reader.onload = async (ev) => {
            try {
                const data = new Uint8Array(ev.target.result);
                const workbook = XLSX.read(data, {type: 'array'});
                const novosItens = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]]);

                console.log('Itens da planilha:', novosItens); // Debug

                if (novosItens.length === 0) {
                    alert("Planilha vazia ou sem dados válidos!");
                    return;
                }

                // Verifica se tem as colunas necessárias
                const primeiroItem = novosItens[0];
                if (!primeiroItem.etiqueta || !primeiroItem.prateleira) {
                    alert("Planilha deve ter colunas 'etiqueta' e 'prateleira'!");
                    return;
                }

                // Adiciona ao Firebase
                let adicionados = 0;
                for (const item of novosItens) {
                    try {
                        await window.firebaseDB.collection('estoque').add({
                            etiqueta: String(item.etiqueta),
                            prateleira: String(item.prateleira),
                            dataInsercao: new Date().toISOString()
                        });
                        adicionados++;
                    } catch (itemError) {
                        console.error('Erro ao adicionar item:', item, itemError);
                    }
                }

                // Atualiza cache local
                estoqueCache = [...estoqueCache, ...novosItens];
                atualizarContador();
                alert(`✅ Sistema Sincronizado! ${adicionados} itens adicionados.`);
            } catch (error) {
                console.error("Erro ao sincronizar Excel:", error);
                alert("Erro ao salvar no servidor. Verifique o console para detalhes.");
            }
        };
        reader.readAsArrayBuffer(e.target.files[0]);
    }

    function atualizarContador() {
        document.getElementById('status-db').innerText = estoqueCache.length + " Itens em estoque";
    }

    function mostrarInserirItem() {
        carregarPrateleirasDisponiveis();
        document.getElementById('modal-inserir').classList.remove('hidden');
        document.getElementById('input-etiqueta').focus();
    }

    function fecharModal() {
        document.getElementById('modal-inserir').classList.add('hidden');
        document.getElementById('input-etiqueta').value = '';
        document.getElementById('select-prateleira').value = '';
    }

    async function carregarPrateleirasDisponiveis() {
        try {
            const select = document.getElementById('select-prateleira');
            select.innerHTML = '<option value="">Carregando...</option>';

            // Busca todas as prateleiras únicas do banco
            const querySnapshot = await window.firebaseDB.collection('estoque').get();
            const prateleirasSet = new Set();

            // Adiciona prateleiras já usadas
            querySnapshot.docs.forEach(doc => {
                const data = doc.data();
                if (data.prateleira) prateleirasSet.add(data.prateleira);
            });

            // Adiciona prateleiras e cofres do mapa (hardcoded para garantir)
            const mapaPrateleiras = [
                // Prateleiras esquerda
                ...Array.from({length: 5}, (_, i) => [
                    185674+i*4, 185675+i*4, 185676+i*4, 185677+i*4
                ]).flat(),
                ...Array.from({length: 6}, (_, i) => [
                    185650+i*4, 185651+i*4, 185652+i*4, 185653+i*4
                ]).flat(),
                ...Array.from({length: 6}, (_, i) => [
                    185626+i*4, 185627+i*4, 185628+i*4, 185629+i*4
                ]).flat(),
                // Rodapé
                185601, 185602, 185603, 185604, 185605, 185606, 185607, 185608,
                185610, 185611, 185612, 185613, 185615, 185616, 185617, 185618,
                185619, 185620, 185621, 185622, 185623, 185624, 185625,
                // Direita
                185700, 202669, 202670, 202671, 185697, 185698, 185699, 202677,
                185694, 185695, 185696, 202678,
                // Cofres
                202682, 202681, 202680, 202679, 202683,
                // Centro
                202672, 202673, 202674, 202675, 202676,
                // Acima dos cofres
                185609, 185614
            ];

            mapaPrateleiras.forEach(p => prateleirasSet.add(String(p)));

            // Ordena e cria options
            const prateleirasOrdenadas = Array.from(prateleirasSet).sort();
            select.innerHTML = '<option value="">Selecione uma prateleira...</option>';
            prateleirasOrdenadas.forEach(prat => {
                const option = document.createElement('option');
                option.value = prat;
                option.textContent = prat;
                select.appendChild(option);
            });

        } catch (error) {
            console.error('Erro ao carregar prateleiras:', error);
            // Fallback com algumas prateleiras
            const select = document.getElementById('select-prateleira');
            select.innerHTML = '<option value="">Erro ao carregar</option><option value="185674">185674</option>';
        }
    }

    async function testarFirebase() {
        try {
            console.log('Testando Firebase...');
            await window.firebaseDB.collection('teste').add({
                mensagem: 'Teste de conexão',
                timestamp: new Date().toISOString()
            });
            alert('✅ Firebase conectado! Dados podem ser salvos.');
        } catch (error) {
            console.error('Erro no teste Firebase:', error);
            alert('❌ Erro na conexão com Firebase. Verifique as regras.');
        }
    }

    async function inserirItem() {
        const etiqueta = document.getElementById('input-etiqueta').value.trim();
        const prateleira = document.getElementById('select-prateleira').value;

        if (!etiqueta || !prateleira) {
            alert("Preencha etiqueta e selecione uma prateleira!");
            return;
        }

        // Verifica se já existe
        if (estoqueCache.find(i => String(i.etiqueta) === etiqueta)) {
            alert("Etiqueta já existe!");
            return;
        }

        try {
            // Adiciona ao Firebase
            await window.firebaseDB.collection('estoque').add({
                etiqueta: etiqueta,
                prateleira: prateleira,
                dataInsercao: new Date().toISOString()
            });

            // Adiciona ao cache local
            estoqueCache.push({ etiqueta: etiqueta, prateleira: prateleira });

            alert("✅ Item inserido: " + etiqueta + " na prateleira " + prateleira);
            fecharModal();
            atualizarContador();
        } catch (error) {
            console.error("Erro ao inserir item:", error);
            alert("Erro ao salvar no servidor. Verifique a conexão com Firebase.");
        }
    }

    render();
    carregarEstoque();
    </script>
</body>
</html>
