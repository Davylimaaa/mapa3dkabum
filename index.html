<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>LIMA 3D LOG - Sistema Final</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #020617; font-family: sans-serif; }
        canvas { display: block; }
        .kb-glass { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
        .kb-orange { background: #ff6500; }
    </style>
</head>
<body>
    <div id="canvas-container"></div>

    <div class="fixed top-6 left-6 z-50 w-80 flex flex-col gap-4 pointer-events-none">
        <div class="kb-glass p-5 rounded-2xl shadow-2xl border-l-4 border-orange-500 pointer-events-auto">
            <h1 class="text-white font-black italic text-xl mb-4 tracking-tighter">LIMA <span class="text-blue-500">3D-LOG</span></h1>
            <input type="text" id="input-bip" placeholder="Bipar Etiqueta ou CF..." 
                   class="w-full bg-slate-800 border border-slate-700 p-3 rounded-xl text-white outline-none focus:ring-2 focus:ring-orange-500 font-bold text-sm">
            
            <div id="info-item" class="hidden mt-4 p-3 bg-blue-500/10 border border-blue-500/20 rounded-xl text-white animate-pulse">
                <p id="nome-txt" class="font-bold text-[11px] uppercase mb-2">---</p>
                <p id="local-txt" class="text-[10px] font-black text-blue-300 uppercase italic">---</p>
                <button onclick="transferir()" class="w-full bg-red-600 font-bold py-2 rounded-lg mt-3 text-[10px] uppercase hover:bg-red-700 transition">Transferência (Baixa)</button>
            </div>
        </div>
    </div>

    <div class="fixed bottom-6 left-6 right-6 z-50 flex justify-between items-end pointer-events-none">
        <label class="kb-glass px-6 py-4 rounded-2xl cursor-pointer text-white font-bold text-sm flex items-center gap-3 pointer-events-auto hover:bg-white/10 transition">
            <i data-lucide="upload"></i> ATUALIZAR ESTOQUE (EXCEL)
            <input type="file" id="up-excel" hidden onchange="syncExcel(event)">
        </label>
        <div class="kb-glass p-4 rounded-2xl text-white text-[10px] font-bold uppercase pointer-events-auto">MAPA: <span class="text-green-400">ONLINE</span></div>
    </div>

    <script>
        lucide.createIcons();
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        scene.add(new THREE.AmbientLight(0xffffff, 0.8));
        scene.add(new THREE.GridHelper(200, 60, 0x1e293b, 0x0f172a));

        let estantes3D = {}; 
        let estoqueCache = [];

        // ESTRUTURA FIXA DA LOJA (Baseado na sua planilha)
        const layout = [
            { rua: 100, ests: [0, 1, 2, 3, 4, 5, 8, 50] },
            { rua: 200, ests: [1, 3, 5, 10, 12] },
            { rua: 300, ests: [1, 2, 3, 4, 5] }
        ];

        function gerarMapa() {
            layout.forEach(r => {
                r.ests.forEach(e => {
                    const box = new THREE.Mesh(new THREE.BoxGeometry(2, 3.5, 1.2), new THREE.MeshPhongMaterial({ color: 0x1e293b, transparent: true, opacity: 0.85 }));
                    box.position.set((r.rua / 10) - 20, 1.75, e * 3);
                    scene.add(box);
                    const edges = new THREE.LineSegments(new THREE.EdgesGeometry(box.geometry), new THREE.LineBasicMaterial({ color: 0x3b82f6 }));
                    box.add(edges);
                    estantes3D[`${r.rua}-${e}`] = box;
                });
            });
        }

        function syncExcel(e) {
            const reader = new FileReader();
            reader.onload = (ev) => {
                const wb = XLSX.read(ev.target.result, {type: 'array'});
                estoqueCache = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);
                alert("Estoque Sincronizado!");
            };
            reader.readAsArrayBuffer(e.target.files[0]);
        }

        document.getElementById('input-bip').addEventListener('input', (e) => {
            const val = e.target.value;
            const p = estoqueCache.find(i => String(i.Local_Etiqueta) === val || String(i.Codigo_CF) === val);
            Object.values(estantes3D).forEach(b => b.material.color.setHex(0x1e293b));
            
            if(p) {
                const bloco = estantes3D[`${p.Andar}-${p.Estante}`];
                if(bloco) {
                    bloco.material.color.setHex(0xff6500);
                    document.getElementById('info-item').classList.remove('hidden');
                    document.getElementById('nome-txt').innerText = p.Nome_Produto;
                    document.getElementById('local-txt').innerText = `Rua ${p.Andar} | Estante ${p.Estante} | Prat ${p.Prateleira || 0}`;
                    camera.position.set(bloco.position.x + 10, 10, bloco.position.z + 10);
                    camera.lookAt(bloco.position);
                }
            } else { document.getElementById('info-item').classList.add('hidden'); }
        });

        function transferir() {
            const val = document.getElementById('input-bip').value;
            if(confirm("Deseja dar baixa neste item?")) {
                estoqueCache = estoqueCache.filter(i => String(i.Local_Etiqueta) !== val && String(i.Codigo_CF) !== val);
                document.getElementById('info-item').classList.add('hidden');
                document.getElementById('input-bip').value = "";
                alert("Transferência Realizada!");
            }
        }

        function animate() { requestAnimationFrame(animate); renderer.render(scene, camera); }
        gerarMapa();
        camera.position.set(35, 35, 35);
        camera.lookAt(0,0,0);
        animate();
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
