<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>LIMA 3D LOG - Gestão de Estoque</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #020617; font-family: 'Inter', sans-serif; }
        #canvas-container { width: 100vw; height: 100vh; }
        .glass { background: rgba(15, 23, 42, 0.85); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
        .kb-orange { background: #ff6500; }
        .neon-border { box-shadow: 0 0 15px rgba(59, 130, 246, 0.5); }
    </style>
</head>
<body>

    <div id="canvas-container"></div>

    <div class="fixed inset-0 pointer-events-none flex flex-col justify-between p-6">
        
        <div class="flex justify-between items-start pointer-events-auto">
            <div class="glass p-5 rounded-2xl w-96 shadow-2xl">
                <div class="flex items-center gap-3 mb-4">
                    <div class="p-2 kb-orange rounded-lg shadow-lg"><i data-lucide="layout-grid" class="text-white w-5 h-5"></i></div>
                    <h1 class="text-white font-black italic text-xl tracking-tighter">LIMA <span class="text-blue-500 font-normal">3D-LOG</span></h1>
                </div>
                
                <div class="relative">
                    <i data-lucide="search" class="absolute left-3 top-3 text-slate-400 w-4"></i>
                    <input type="text" id="input-bip" placeholder="Bipar Etiqueta ou CF..." 
                           class="w-full bg-slate-900/50 border border-slate-700 p-3 pl-10 rounded-xl text-white outline-none focus:ring-2 focus:ring-orange-500 transition font-bold">
                </div>

                <div id="info-produto" class="hidden mt-4 p-4 bg-blue-500/10 border border-blue-500/30 rounded-xl animate-in fade-in slide-in-from-top-2">
                    <p id="nome-item" class="text-white font-bold text-sm mb-2 uppercase">---</p>
                    <div class="flex gap-2 text-[10px] font-black uppercase">
                        <span class="bg-blue-600 px-2 py-1 rounded">Rua <b id="rua-v">0</b></span>
                        <span class="bg-slate-700 px-2 py-1 rounded">Estante <b id="est-v">0</b></span>
                    </div>
                    <button onclick="transferir()" class="w-full bg-red-600 hover:bg-red-700 text-white font-bold py-2 rounded-lg mt-3 text-xs flex items-center justify-center gap-2 transition">
                        <i data-lucide="move-right" class="w-3"></i> TRANSFERÊNCIA (SAÍDA)
                    </button>
                </div>
            </div>

            <div class="flex flex-col gap-3">
                <div class="glass p-3 rounded-xl text-white text-[10px] font-bold uppercase tracking-widest text-center">
                    Itens Mapeados: <span id="count-itens" class="text-green-400">0</span>
                </div>
            </div>
        </div>

        <div class="flex justify-between items-end pointer-events-auto">
            <div class="flex gap-4">
                <label class="glass px-6 py-4 rounded-2xl cursor-pointer hover:bg-white/10 transition flex items-center gap-3 text-white font-bold text-sm">
                    <i data-lucide="file-up" class="text-blue-400"></i> IMPORTAR EXCEL
                    <input type="file" hidden onchange="importarExcel(event)">
                </label>
                <button onclick="abrirModalManual()" class="kb-orange px-6 py-4 rounded-2xl text-white font-bold text-sm flex items-center gap-3 shadow-xl hover:brightness-110">
                    <i data-lucide="plus-circle"></i> NOVO PRODUTO
                </button>
            </div>
            
            <button onclick="window.location.reload()" class="glass p-4 rounded-2xl text-white hover:bg-white/10 transition">
                <i data-lucide="refresh-cw"></i>
            </button>
        </div>
    </div>

    <div id="modal-manual" class="fixed inset-0 bg-black/80 hidden flex items-center justify-center z-[100] p-4 backdrop-blur-sm">
        <div class="glass w-full max-w-md rounded-3xl p-8 text-white border border-white/20">
            <h2 class="text-2xl font-black mb-6 italic flex items-center gap-2">
                <i data-lucide="edit-3" class="text-orange-500"></i> NOVO REGISTRO
            </h2>
            <div class="space-y-4">
                <input type="text" id="m-nome" placeholder="Nome do Produto" class="w-full bg-slate-900 border border-slate-700 p-4 rounded-xl outline-none focus:border-blue-500">
                <div class="grid grid-cols-2 gap-4">
                    <input type="number" id="m-andar" placeholder="Andar (Rua)" class="w-full bg-slate-900 border border-slate-700 p-4 rounded-xl outline-none">
                    <input type="number" id="m-estante" placeholder="Estante" class="w-full bg-slate-900 border border-slate-700 p-4 rounded-xl outline-none">
                </div>
                <input type="text" id="m-etiqueta" placeholder="Código da Etiqueta" class="w-full bg-slate-900 border border-slate-700 p-4 rounded-xl outline-none">
            </div>
            <div class="mt-8 flex gap-3 font-bold uppercase text-xs">
                <button onclick="fecharModalManual()" class="flex-1 bg-white/10 p-4 rounded-xl hover:bg-white/20">Cancelar</button>
                <button onclick="registrarManual()" class="flex-1 kb-orange p-4 rounded-xl hover:brightness-110">Registrar Tudo</button>
            </div>
        </div>
    </div>

    <script>
        lucide.createIcons();

        // --- MOTOR 3D (THREE.JS) ---
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        scene.add(new THREE.AmbientLight(0xffffff, 0.7));
        const pLight = new THREE.PointLight(0xffffff, 1);
        pLight.position.set(20, 30, 20);
        scene.add(pLight);

        // Chão (Grid Logístico)
        const grid = new THREE.GridHelper(200, 60, 0x1e293b, 0x0f172a);
        scene.add(grid);

        let estoque = JSON.parse(localStorage.getItem('dados_logistica_3d') || "[]");
        let blocos3D = {};

        function criarBlocoEstante(item) {
            // Desenho da Estante (Box)
            const geometry = new THREE.BoxGeometry(1.6, 3, 0.8);
            const material = new THREE.MeshPhongMaterial({ color: 0x1e293b, transparent: true, opacity: 0.85 });
            const box = new THREE.Mesh(geometry, material);

            // Coordenadas baseadas no seu estoque (X = Rua, Z = Estante)
            const x = (parseInt(item.Andar) / 10) || 0;
            const z = (parseInt(item.Estante) * 2) || 0;
            const y = 1.5;

            box.position.set(x, y, z);
            scene.add(box);

            // Borda Neon para visualização
            const edges = new THREE.EdgesGeometry(geometry);
            const line = new THREE.LineSegments(edges, new THREE.LineBasicMaterial({ color: 0x3b82f6 }));
            box.add(line);

            // Salva dados e indexa
            box.userData = item;
            if(item.Local_Etiqueta) blocos3D[String(item.Local_Etiqueta)] = box;
            if(item.Codigo_CF) blocos3D[String(item.Codigo_CF)] = box;
            
            return box;
        }

        function renderizarMapa() {
            // Limpa o 3D atual
            Object.values(blocos3D).forEach(b => scene.remove(b));
            blocos3D = {};
            
            estoque.forEach(item => {
                if(item.Andar && item.Estante) criarBlocoEstante(item);
            });
            document.getElementById('count-itens').innerText = Object.keys(blocos3D).length;
        }

        // --- SISTEMA DE BUSCA ---
        document.getElementById('input-bip').addEventListener('input', (e) => {
            const busca = e.target.value;
            const bloco = blocos3D[busca];

            Object.values(blocos3D).forEach(b => b.material.color.setHex(0x1e293b));

            if(bloco) {
                const d = bloco.userData;
                bloco.material.color.setHex(0xff6500); // Fica laranja igual KaBuM
                
                document.getElementById('info-produto').classList.remove('hidden');
                document.getElementById('nome-item').innerText = d.Nome_Produto;
                document.getElementById('rua-v').innerText = d.Andar;
                document.getElementById('est-v').innerText = d.Estante;

                // Zoom Suave
                const targetPos = new THREE.Vector3(bloco.position.x + 10, 10, bloco.position.z + 10);
                camera.position.lerp(targetPos, 0.1);
                camera.lookAt(bloco.position);
            } else {
                document.getElementById('info-produto').classList.add('hidden');
            }
        });

        // --- FUNÇÕES DE IMPORTAÇÃO E CADASTRO ---
        function importarExcel(e) {
            const reader = new FileReader();
            reader.onload = (ev) => {
                const data = new Uint8Array(ev.target.result);
                const wb = XLSX.read(data, {type: 'array'});
                const json = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);
                estoque = json;
                localStorage.setItem('dados_logistica_3d', JSON.stringify(estoque));
                renderizarMapa();
                alert("Planilha Sincronizada com o Mapa 3D!");
            };
            reader.readAsArrayBuffer(e.target.files[0]);
        }

        function abrirModalManual() { document.getElementById('modal-manual').classList.remove('hidden'); }
        function fecharModalManual() { document.getElementById('modal-manual').classList.add('hidden'); }

        function registrarManual() {
            const novo = {
                Nome_Produto: document.getElementById('m-nome').value,
                Andar: document.getElementById('m-andar').value,
                Estante: document.getElementById('m-estante').value,
                Local_Etiqueta: document.getElementById('m-etiqueta').value,
                Codigo_CF: "MANUAL-" + Date.now()
            };
            
            if(!novo.Nome_Produto || !novo.Local_Etiqueta) return alert("Erro: SKU e Etiqueta obrigatórios!");
            
            estoque.push(novo);
            localStorage.setItem('dados_logistica_3d', JSON.stringify(estoque));
            criarBlocoEstante(novo);
            fecharModalManual();
            alert("Produto Registrado com Sucesso!");
        }

        function transferir() {
            const busca = document.getElementById('input-bip').value;
            const bloco = blocos3D[busca];
            if(bloco && confirm("Confirmar TRANSFERÊNCIA? O local será liberado no sistema.")) {
                estoque = estoque.filter(p => p.Local_Etiqueta != busca && p.Codigo_CF != busca);
                localStorage.setItem('dados_logistica_3d', JSON.stringify(estoque));
                scene.remove(bloco);
                delete blocos3D[busca];
                document.getElementById('info-produto').classList.add('hidden');
                document.getElementById('input-bip').value = "";
            }
        }

        // Loop de Renderização
        function animate() {
            requestAnimationFrame(animate);
            renderer.render(scene, camera);
        }

        camera.position.set(25, 25, 25);
        camera.lookAt(0,0,0);
        renderizarMapa();
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
